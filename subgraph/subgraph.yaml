specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Afternote
    network: sepolia
    source:
      address: "0x36c282F17959c02De25500b3fF53E753b08E5627"
      abi: Afternote
      startBlock: 10818730
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - VaultAdded
        - VaultPinged
        - VaultReleased
        - VaultUpdated
      abis:
        - name: Afternote
          file: ./abis/Afternote.json
      eventHandlers:
        - event: VaultAdded(indexed uint256,indexed address,indexed bytes32,bytes32,bytes,address[])
          handler: handleVaultAdded
        - event: VaultPinged(indexed uint256,indexed address)
          handler: handleVaultPinged
        - event: VaultReleased(indexed uint256,indexed address,indexed address,address[])
          handler: handleVaultReleased
        - event: VaultUpdated(indexed uint256,indexed address,indexed bytes32,bytes32,bytes,address[])
          handler: handleVaultUpdated
      file: ./src/afternote.ts
