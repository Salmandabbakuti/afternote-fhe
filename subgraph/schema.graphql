type VaultAdded @entity(immutable: true) {
  id: Bytes!
  idx: BigInt! # uint256
  owner: Bytes! # address
  encryptedKeyHandle: Bytes! # bytes32
  encryptedIvHandle: Bytes! # bytes32
  ciphertext: Bytes! # bytes
  beneficiaries: [Bytes!]! # address[]
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

